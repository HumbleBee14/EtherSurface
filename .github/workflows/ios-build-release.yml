name: iOS Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'EtherSurface-iOS/**'
      - '.github/workflows/ios-build-release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build
        working-directory: EtherSurface-iOS
        run: |
          xcodebuild \
            -project Etherpad.xcodeproj \
            -scheme Etherpad \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO
