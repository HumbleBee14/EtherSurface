name: iOS Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'EtherSurface-iOS/**'
      - '.github/workflows/ios-build-release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Setup Xcode
        run: |
          # Use default Xcode
          sudo xcode-select --reset
          xcodebuild -version
          echo "Xcode path: $(xcode-select -p)"

      - name: Build Project
        run: |
          cd EtherSurface-iOS
          mkdir -p build

          echo "🔨 Building Etherpad..."
          xcodebuild \
            -project Etherpad.xcodeproj \
            -scheme Etherpad \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Create Archive
        if: success()
        run: |
          cd EtherSurface-iOS

          echo "📦 Creating archive..."
          xcodebuild \
            -project Etherpad.xcodeproj \
            -scheme Etherpad \
            -configuration Release \
            -archivePath build/Etherpad.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee archive.log

          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Archive created"
          else
            echo "❌ Archive failed"
            exit 1
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: build-logs
          path: |
            EtherSurface-iOS/build.log
            EtherSurface-iOS/archive.log
          retention-days: 7

      - name: Success
        if: success()
        run: echo "✅ iOS app built successfully!"
