name: EtherSurface
options:
  bundleIdPrefix: com.zebproj
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_OBJC_BRIDGING_HEADER: "EtherSurface/EtherSurface-Bridging-Header.h"
    HEADER_SEARCH_PATHS:
      - "$(PROJECT_DIR)/Headers"
    OTHER_LDFLAGS:
      - "-lc++"
    ENABLE_BITCODE: false
    CODE_SIGN_STYLE: Automatic

targets:
  EtherSurface:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: EtherSurface
        excludes:
          - "**/*.xcframework"
      - path: Headers
    resources:
      - path: EtherSurface/Resources
      - path: EtherSurface/About/about.html
      - path: EtherSurface/About/logo.png
      - path: EtherSurface/About/logo_shadow.png
      - path: EtherSurface/Assets.xcassets
      - path: EtherSurface/LaunchScreen.storyboard
    settings:
      base:
        INFOPLIST_FILE: EtherSurface/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zebproj.ethersurface
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTED_INTERFACE_ORIENTATIONS~ipad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
